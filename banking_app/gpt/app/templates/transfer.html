{% extends 'base.html' %}
{% block content %}
<section class="card auth-card wider">
    <h1>Überweisung</h1>
    <p>Überweise Geld von einem eigenen Konto auf ein anderes vorhandenes Konto.</p>
    {% if error %}<div class="alert error">{{ error }}</div>{% endif %}
    <form method="post" class="form-grid">
        <label>Quellkonto
            <select name="from_account_id" required>
                {% for account in accounts %}
                <option value="{{ account.id }}" {% if form and form.from_account_id == account.id %}selected{% endif %}>
                    {{ account.name }} – {{ account.account_number }} ({{ '%.2f'|format(account.balance) }} €)
                </option>
                {% endfor %}
            </select>
        </label>
        <label>Ziel-Kontonummer
            <input type="text" name="to_account_number" value="{{ form.to_account_number if form else '' }}" required>
        </label>
        <label>Betrag in €
            <input type="number" step="0.01" min="0.01" name="amount" value="{{ form.amount if form else '' }}" required>
        </label>
        <label>Verwendungszweck
            <input type="text" name="reference" value="{{ form.reference if form else '' }}">
        </label>
        <button type="submit">Jetzt überweisen</button>
    </form>
</section>
{% endblock %}
